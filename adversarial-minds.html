  ["Reads less like a textbook and more like a methodology — exactly what the field needs.", "—  reader"],
  ["Treats persuasion as adversarial input. The bridge between the social engineer and the prompt engineer.", "—  reader"],
];

  ["I",   "Foundations",            "Why adversaries are reasoners, not exploits. The substrate problem."],
  ["II",  "The Mind as a System",   "Cognitive primitives. Bias as exploitable state. Trust as authentication."],
  ["III", "Attack Vocabulary",      "Persona, framing, decay, drift, compositional pressure."],
  ["IV",  "From Human to Machine",  "Why the same attacks work against LLMs. Translating SE primitives to prompts."],
  ["V",   "Defense by Design",      "Engineering trust boundaries when the user is the attack surface."],
  ["VI",  "Field Notes",            "Cases — phishing campaigns, jailbreaks, agent compromises — annotated."],
];

const Stat = ({ k, v }) => (
  <div style={{ display: "grid", gridTemplateColumns: "120px 1fr", gap: 16, padding: "12px 0", borderTop: "1px solid var(--line)" }}>
    <span style={{ fontFamily: "var(--f-mono)", fontSize: 11, color: "var(--fg-3)", textTransform: "uppercase", letterSpacing: "0.12em" }}>{k}</span>
    <span style={{ fontFamily: "var(--f-mono)", fontSize: 13, color: "var(--fg)" }}>{v}</span>
  </div>
);

    {/* Hero */}
    <section style={{ borderBottom: "1px solid var(--line)" }}>

          <p style={{ margin: "24px 0 0", fontSize: 15, color: "var(--fg-2)", lineHeight: 1.7, maxWidth: 640, fontFamily: "var(--f-mono)" }}>

          </p>
        </div>

          <Stat k="related" v="AATMF · SEF · P.R.O.M.P.T" />

              <div style={{ fontSize: 18, lineHeight: 1.55, color: "var(--fg)", letterSpacing: "-0.01em" }}>{q}</div>
              <div style={{ marginTop: 24, fontFamily: "var(--f-mono)", fontSize: 12, color: "var(--fg-3)" }}>{w}</div>
            </blockquote>

        </div>
      </div>
    </section>

    {/* Author */}
    <section style={{ borderBottom: "1px solid var(--line)" }}>
      <div style={{ maxWidth: 1280, margin: "0 auto", padding: "96px 32px", display: "grid", gridTemplateColumns: "180px 1fr", gap: 40, alignItems: "start" }}>
        <Sticky>04 · author</Sticky>
        <div>
          <h2 style={{ margin: 0, fontSize: 48, fontWeight: 500, lineHeight: 1, letterSpacing: "-0.035em" }}>kai aizen.</h2>
          <p style={{ margin: "32px 0 0", fontSize: 17, lineHeight: 1.65, color: "var(--fg-2)", maxWidth: 720, fontFamily: "var(--f-mono)" }}>
            Independent offensive security researcher. 23 published CVEs, 5 Linux kernel mainline patches, creator of <a href="/aatmf" style={{ color: "var(--signal-2)" }}>AATMF</a>, <a href="/prompt" style={{ color: "var(--signal-2)" }}>P.R.O.M.P.T</a>, and <a href="/sef" style={{ color: "var(--signal-2)" }}>SEF</a>. Hakin9 contributing author. NVD/MITRE contributor.
          </p>
          <p style={{ margin: "16px 0 0", fontSize: 15, lineHeight: 1.7, color: "var(--fg-3)", maxWidth: 720, fontFamily: "var(--f-mono)" }}>
            Writing and engagements: <a href="/contact" style={{ color: "var(--fg)" }}>contact</a> · <a href="/services" style={{ color: "var(--fg)" }}>services</a> · <a href="https://github.com/SnailSploit" style={{ color: "var(--fg)" }}>github</a> · <a href="https://x.com/SnailSploit" style={{ color: "var(--fg)" }}>x</a>.
          </p>
        </div>
      </div>
    </section>

    <SiteFooter section="adversarial minds" />
  </div>
);
